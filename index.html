<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aura Sign</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME PAGE -->
<div id="home">
  <img src="logo.jpg" class="logo">
  <h1>Aura Sign</h1>
  <p>Bridging Silence. Connecting Worlds.</p>
  <button onclick="startApp()">Start Translating</button>
</div>

<!-- TRANSLATE PAGE -->
<div id="app" style="display:none;">
  <div class="left">
    <input type="text" id="textInput" placeholder="Type hello, please, thank you">
    <button onclick="translate()">Translate</button>
    <button onclick="speak()">Play Voice</button>
    <p id="status"></p>
  </div>

  <div class="right">
    <canvas id="avatarCanvas"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>
<script src="script.js"></script>

</body>
</html>
