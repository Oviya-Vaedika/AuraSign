<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aura Sign</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#0b0f19] text-white">

<!-- NAV -->
<header class="flex justify-between p-4 border-b border-gray-700">
  <h1 class="text-xl text-violet-400 font-bold">Aura Sign</h1>
  <span class="text-sm bg-violet-600 px-3 py-1 rounded">AI v2.4</span>
</header>

<div class="flex flex-col lg:flex-row p-4 gap-4">

  <!-- LEFT PANEL -->
  <div class="lg:w-1/2 bg-white text-black p-4 rounded-lg">

    <textarea id="inputText" maxlength="500"
      class="w-full h-40 p-3 border rounded"
      placeholder="Enter text..."></textarea>

    <div class="flex justify-between mt-2 text-sm text-gray-500">
      <span id="charCount">0/500</span>
      <button onclick="startSpeech()">
        <i class="fas fa-microphone"></i>
      </button>
    </div>

    <button onclick="translateText()"
      class="w-full mt-4 py-3 bg-gradient-to-r from-indigo-500 to-violet-600 text-white rounded">
      Translate
    </button>

  </div>

  <!-- RIGHT PANEL -->
  <div class="lg:w-1/2 bg-black p-4 rounded-lg">

    <div id="avatarContainer" class="w-full h-[350px]"></div>

    <div class="mt-4 bg-gray-900 p-3 rounded">
      <strong>ASL OUTPUT:</strong>
      <p id="outputText" class="text-violet-400 mt-2"></p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
